name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  GO_VERSION: "1.26.4"
  GOFUMPT_VERSION: "v0.10.0"
  GOVULNCHECK_VERSION: "v1.5.0"
  STATICCHECK_VERSION: "v0.7.0"
  PYTHON_RELEASE_VERSION: "3.12"
  NODE_VERSION: "24"
  NPM_VERSION: "11.18.0"

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --component clippy --component rustfmt
          rustup default stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-stable-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-stable-

      - name: Format
        run: cargo fmt --check

      - name: Check
        run: cargo check --workspace --all-features

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --workspace --all-features

  msrv:
    name: MSRV
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.96
        run: |
          rustup toolchain install 1.96 --profile minimal
          rustup default 1.96

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-msrv-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-msrv-

      - name: Check MSRV
        run: cargo check --workspace --all-features

  go:
    name: Go checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: go

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go/go.sum

      - name: Module tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Format
        run: |
          go run mvdan.cc/gofumpt@${GOFUMPT_VERSION} -w .
          git diff --exit-code -- .

      - name: Test
        run: go test ./...

      - name: Race test
        run: go test -race ./...

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@${STATICCHECK_VERSION} ./...

      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION} ./...

  python:
    name: Python checks (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    defaults:
      run:
        working-directory: python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Format
        run: python -m ruff format --check .

      - name: Ruff
        run: python -m ruff check --output-format=github .

      - name: Mypy
        run: python -m mypy src

      - name: Test with coverage
        run: python -m pytest --cov=txline --cov-report=term-missing --cov-report=xml

      - name: Security lint
        if: matrix.python-version == env.PYTHON_RELEASE_VERSION
        run: python -m bandit -q -r src -c pyproject.toml

      - name: Dependency audit
        if: matrix.python-version == env.PYTHON_RELEASE_VERSION
        run: python -m pip_audit . --strict

      - name: Build
        if: matrix.python-version == env.PYTHON_RELEASE_VERSION
        run: |
          rm -rf dist
          python -m build

      - name: Check package metadata
        if: matrix.python-version == env.PYTHON_RELEASE_VERSION
        run: python -m twine check --strict dist/*

      - name: Smoke installed wheel
        if: matrix.python-version == env.PYTHON_RELEASE_VERSION
        run: |
          wheel="$(find dist -name '*.whl' -print -quit)"
          test -n "${wheel}"
          python -m venv .venv-smoke
          . .venv-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install "${wheel}"
          python - <<'PY'
          from importlib.metadata import version
          import txline

          assert version("txline")
          assert hasattr(txline, "TxlineClient")
          PY

  typescript:
    name: TypeScript checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: typescript

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: typescript/package-lock.json

      - name: Install npm
        run: npm install -g npm@${NPM_VERSION}

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Audit dependencies
        run: npm run security:audit

      - name: Verify registry signatures
        run: npm run security:signatures

      - name: Format
        run: npm run format

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Verify package
        run: npm run verify:package
